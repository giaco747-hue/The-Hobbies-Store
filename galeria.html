<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galería 2</title>
<link rel="shortcut icon" href="assets/Tienda de hobbies retro y neón.png" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Honk&display=swap" rel="stylesheet">

<style>

/* HEADER */

.header{

    display:grid;

    grid-template-columns: 1fr auto 1fr;

    align-items:center;

    padding:1px 35px;

    margin-bottom:40px;

    background:rgba(0,0,0,0.75);

    border-bottom:3px solid #ff3131;

    box-shadow:
    0 0 20px rgba(0,0,0,0.8);

    border-radius:20px;
}



/* TITULO */

.header h1{

    margin:0;

    font-size:60px;

    justify-self:start;
}

/* LOGO */


.logo-container{

    display:flex;

    align-items:center;

    gap:15px;
}

.logo{

    width:110px;

    height:auto;

    border-radius:50%;

    
border:3px solid #ff3131;



    box-shadow:
    0 0 15px rgba(255,49,49,0.7);

    transition:0.3s;

}

.logo:hover{

    transform:scale(1.08);

    box-shadow:
    0 0 30px rgba(255,49,49,1);
}



/* BOTON */

.volver{

    justify-self:end;

    padding:12px 20px;

    border:none;

    border-radius:12px;

    background:#ff3131;

    color:white;

    font-size:16px;

    font-family:Arial, Helvetica, sans-serif;

    font-weight:bold;

    cursor:pointer;
}
body{
    margin: 2px;
    padding:40px;
    background:#111;
    color:white;
    font-family: 'Honk', cursive;
    background-image: url("assets/fondo-retro.png.png");
min-height: 100vh;
backdrop-filter: brightness(0.8);
background-size: cover;
background-position: center;
background-attachment: fixed;

}

/* TITULO */

h1{
    text-align:center;
    margin-bottom:40px;
    font-size:60px;
}

/* CARRUSEL */

.carousel-item img {
    height: 500px;
    object-fit: cover;
    border-radius: 12px;
}


.carousel-caption {
    background: rgba(0, 0, 0, 0.65);
    border-radius: 12px;
    padding: 15px;
    bottom: 20px;
}

.carousel-caption p {
    margin: 0;
    font-size: 18px;
    font-weight: bold;
    color: white;
}


/* CONTENEDOR PRINCIPAL */

.galeria-layout{
    display:flex;

    justify-content:center;
    align-items:flex-start;

    gap:40px;

    width:100%;

    flex-wrap:wrap;
}

/* SECCION CARRUSEL */

.carousel-section{
    width:55%;
    min-width:320px;
    border: 4px solid rgb(204, 28, 28);
    border-radius: 20px;
}

/* SECCIÓN VIDEO */

.video-section{
    width:35%;
    min-width:320px;

    border: 4px solid rgb(204, 28, 28);
    border-radius: 20px;

    overflow:hidden;

    padding:4px;

    background: rgba(0,0,0,0.4);
}

/* VIDEO */

.video-container video{
    width:100%;
    height:410px;
    border-radius: 20px;
}

/* BOTON VOLVER */
.volver{

    position:fixed;
    top:20px;
    right:20px;
    padding:12px 20px;
    border:none;
    border-radius:12px;

    background:#ff3131;

    color:white;

    font-size:16px;

    font-family:Arial, Helvetica, sans-serif;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;

    box-shadow:
    0 0 10px rgba(255,49,49,0.7);

    z-index:999;
}

.volver:hover{

    transform:scale(1.05);

    background:#ff5555;
}


/* RESPONSIVE */


/* =========================
   RESPONSIVE
========================= */

@media(max-width:900px){

    body{

        padding:20px;
    }

    .header{

        grid-template-columns:1fr;

        text-align:center;

        gap:20px;

        padding:20px;
    }

    .logo-container{

        flex-direction:column;

        justify-content:center;
    }

    .header h1{

        font-size:42px;
    }

    .volver{

        position:relative;

        top:auto;
        right:auto;

        margin:auto;
    }

    .galeria-layout{

        flex-direction:column;

        align-items:center;
    }

    .carousel-section,
    .video-section{

        width:100%;
    }

    .carousel-item img{

        height:300px;
    }

    .video-container video{

        height:300px;
    }
}



</style>

</head>

<body>




<header class="header">

    <div class="logo-container">

        <img
        src="assets/Tienda de hobbies retro y neón.png"
        class="logo">

        <h1>Galería RC</h1>

    </div>

    <button class="volver"
    onclick="window.location.href='index.html'">

    ⬅ Volver al inicio



    </button>

</header>


<div class="galeria-layout">

    <!-- CARRUSEL -->
    <div class="carousel-section">

        <div id="carouselHobbies" class="carousel slide" data-bs-ride="carousel">

            <div class="carousel-inner">

                <div class="carousel-item active">
                    <img src="assets/airwolf hd.jpg" class="d-block w-100">
                     <div class="carousel-caption">
        <p>Helicóptero RC Airwolf, alto nivel de detalle y estabilidad.</p>
                </div>
                </div>

                <div class="carousel-item">
                    <img src="assets/f1 hd.jpg" class="d-block w-100">
                     <div class="carousel-caption">
        <p>Coche RC F1, velocidad y precisión en cada vuelta.</p>
                </div>
                </div>

                <div class="carousel-item">
                    <img src="assets/f22 hd.jpg" class="d-block w-100">
                     <div class="carousel-caption">
        <p>Avión RC, diseño aerodinámico y rendimiento excepcional.</p>
                </div>
                </div>

                <div class="carousel-item">
                    <img src="assets/tank hd.jpg" class="d-block w-100">
                     <div class="carousel-caption">
        <p>Tanque RC, fuerza y resistencia en cada combate.</p>
                </div>
                </div>

                <div class="carousel-item">
                    <img src="assets/boat hd 2.jpg" class="d-block w-100">
                     <div class="carousel-caption">
        <p>Barco RC, velocidad y maniobrabilidad en el agua.</p>
                </div>
                </div>

            </div>

            <!-- BOTONES -->

            <button class="carousel-control-prev" type="button" data-bs-target="#carouselHobbies" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>

            <button class="carousel-control-next" type="button" data-bs-target="#carouselHobbies" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>

        </div>

    </div>

    <!-- VIDEO -->  
     
    <div class="video-section">

        <div class="video-container">

            <video autoplay muted loop controls>
 <source src="assets\Ford rc.mp4" type="video/mp4"> 


</video>

        </div>

    </div>

</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
